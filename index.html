<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刷题APP</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  margin: 0;
  background: #f5f5f5;
}

.header {
  background: #4CAF50;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 18px;
}

.progress {
  height: 6px;
  background: #ddd;
}

.progress-bar {
  height: 6px;
  background: #4CAF50;
  width: 0%;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

.option {
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  background: #eee;
}

.option.selected { background: #cce5ff; }
.option.correct { background: #a5d6a7; }
.option.wrong { background: #ef9a9a; }

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

.submit { background: #4CAF50; color: white; }
.next { background: #2196F3; color: white; }

.stats {
  font-size: 14px;
  color: #555;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="header">📘 刷题APP</div>
<div class="progress"><div class="progress-bar" id="bar"></div></div>

<div class="container">

<div class="stats" id="stats"></div>

<div class="card">
  <div id="question"></div>
</div>

<div id="options"></div>

<input id="input" style="display:none;width:100%;padding:10px">

<button class="submit" onclick="submitAnswer()">提交</button>
<button class="next" onclick="nextQuestion()">下一题</button>

<div id="result"></div>

</div>

<script>

let questions = [
  { id:1, type:"single", question:"测试题？", options:["A","B","C","D"], answer:[0], wrong:0,done:0,correct:0 }
];

let current = 0;
let selected = [];

function showQuestion(){
  let q = questions[current];
  selected = [];

  document.getElementById("question").innerText = `第${q.id}题：${q.question}`;

  let html = "";

  if(q.type==="single" || q.type==="multi"){
    q.options.forEach((opt,i)=>{
      html += `<div class="option" onclick="selectOpt(${i})" id="opt${i}">${opt}</div>`;
    });
    document.getElementById("input").style.display="none";
  } else {
    document.getElementById("input").style.display="block";
    html="";
  }

  document.getElementById("options").innerHTML = html;
  document.getElementById("result").innerText = "";
  updateStats();
}

function selectOpt(i){
  if(selected.includes(i)){
    selected = selected.filter(x=>x!==i);
    document.getElementById("opt"+i).classList.remove("selected");
  } else {
    selected.push(i);
    document.getElementById("opt"+i).classList.add("selected");
  }
}

function submitAnswer(){
  let q = questions[current];
  q.done++;

  let correct = false;

  if(q.type==="blank"){
    let val = document.getElementById("input").value.trim();
    correct = val === q.answer;
  } else {
    correct = JSON.stringify(selected.sort()) === JSON.stringify(q.answer.sort());
  }

  if(q.type!=="blank"){
    q.options.forEach((_,i)=>{
      let el = document.getElementById("opt"+i);
      if(q.answer.includes(i)) el.classList.add("correct");
      if(selected.includes(i) && !q.answer.includes(i)) el.classList.add("wrong");
    });
  }

  if(correct){
    q.correct++;
    document.getElementById("result").innerText="✔ 正确";
  } else {
    q.wrong++;
    document.getElementById("result").innerText="✘ 错误";
  }

  updateStats();

  setTimeout(nextQuestion, 800); // 自动跳题
}

function nextQuestion(){
  current = (current+1)%questions.length;
  showQuestion();
}

function updateStats(){
  let total = questions.reduce((a,b)=>a+b.done,0);
  let correct = questions.reduce((a,b)=>a+b.correct,0);

  let rate = total===0?0:Math.round(correct/total*100);

  document.getElementById("stats").innerText =
    `已做:${total} 正确率:${rate}%`;

  document.getElementById("bar").style.width =
    (total/questions.length*100)+"%";
}

showQuestion();

</script>

</body>
</html>
