let current = 0;
let selected = [];

let rangeStart = null;
let rangeEnd = null;
let wrongMode = false;

// 自动生成范围按钮（支持500题）
function generateRangeButtons(){
  let container = document.getElementById("rangeButtons");
  container.innerHTML = "";

  container.innerHTML += `<button onclick="setRange(null,null)">全部</button>`;

  let size = 50;
  let total = questions.length;

  for(let i = 1; i <= total; i += size){
    let start = i;
    let end = Math.min(i + size - 1, total);

    container.innerHTML +=
      `<button onclick="setRange(${start},${end})">${start}-${end}</button>`;
  }

  container.innerHTML += `<button onclick="startWrong()">错题</button>`;
}

// 范围
function setRange(start, end){
  rangeStart = start;
  rangeEnd = end;
  wrongMode = false;
  current = 0;
  showQuestion();
}

// 错题
function startWrong(){
  wrongMode = true;
  current = 0;
  showQuestion();
}

// 获取题目
function getCurrentList(){
  let list = questions;

  if(wrongMode){
    list = list.filter(q => q.wrong > 0);
  }

  if(rangeStart !== null && rangeEnd !== null){
    list = list.filter(q => q.id >= rangeStart && q.id <= rangeEnd);
  }

  return list;
}

// 显示题目
function showQuestion(){
  let list = getCurrentList();

  if(list.length === 0){
    document.getElementById("question").innerText = "当前范围没有题目";
    document.getElementById("options").innerHTML = "";
    return;
  }

  let q = list[current];
  selected = [];

  let typeClass = "";
  let typeText = "";

  if(q.type === "single"){ typeClass="single"; typeText="单选题"; }
  if(q.type === "multi"){ typeClass="multi"; typeText="多选题"; }
  if(q.type === "blank"){ typeClass="blank"; typeText="填空题"; }

  document.getElementById("question").innerHTML =
    `<div class="type-tag ${typeClass}">${typeText}</div>
     <div>第${q.id}题：${q.question}</div>`;

  let html = "";

  if(q.type==="single" || q.type==="multi"){
    q.options.forEach((opt,i)=>{
      html += `<div class="option" onclick="selectOpt(${i})" id="opt${i}">${opt}</div>`;
    });
    document.getElementById("input").style.display="none";
  } else {
    document.getElementById("input").style.display="block";
    html="";
  }

  document.getElementById("options").innerHTML = html;
  document.getElementById("result").innerText = "";

  updateStats();
}

// 选择（单选限制）
function selectOpt(i){
  let list = getCurrentList();
  let q = list[current];

  if(q.type === "single"){
    selected = [i];
    document.querySelectorAll(".option").forEach(el => el.classList.remove("selected"));
    document.getElementById("opt"+i).classList.add("selected");
    return;
  }

  if(selected.includes(i)){
    selected = selected.filter(x=>x!==i);
    document.getElementById("opt"+i).classList.remove("selected");
  } else {
    selected.push(i);
    document.getElementById("opt"+i).classList.add("selected");
  }
}

// 提交
function submitAnswer(){
  let list = getCurrentList();
  let q = list[current];

  q.done++;

  let correct = false;

  if(q.type==="blank"){
    let val = document.getElementById("input").value.trim();
    correct = val === q.answer;
  } else {
    correct = JSON.stringify(selected.sort()) === JSON.stringify(q.answer.sort());
  }

  if(q.type!=="blank"){
    q.options.forEach((_,i)=>{
      let el = document.getElementById("opt"+i);
      if(q.answer.includes(i)) el.classList.add("correct");
      if(selected.includes(i) && !q.answer.includes(i)) el.classList.add("wrong");
    });
  }

  if(correct){
    q.correct++;
    document.getElementById("result").innerText="✔ 正确";
  } else {
    q.wrong++;
    document.getElementById("result").innerText="✘ 错误";
  }

  updateStats();

  setTimeout(nextQuestion, 800);
}

// 下一题
function nextQuestion(){
  let list = getCurrentList();
  current = (current + 1) % list.length;
  showQuestion();
}

// 统计
function updateStats(){
  let total = questions.reduce((a,b)=>a+b.done,0);
  let correct = questions.reduce((a,b)=>a+b.correct,0);

  let rate = total===0?0:Math.round(correct/total*100);

  document.getElementById("stats").innerText =
    `已做:${total} 正确率:${rate}%`;

  document.getElementById("bar").style.width =
    (total/questions.length*100)+"%";
}

// 初始化
generateRangeButtons();
showQuestion();

</script>
