// ===== 状态 =====
let current = 0;
let selected = [];
let inputAnswer = "";
let mode = "order";

// ===== 显示题目 =====
function showQuestion(q=null){

  if(!q) q = questions[current];

  selected = [];
  inputAnswer = "";

  document.getElementById("question").innerText =
    `第${q.id}题：${q.question}`;

  let html = "";

  if(q.type==="single"){
    q.options.forEach((opt,i)=>{
      html += `<div><input type="radio" onclick="selected=[${i}]"> ${opt}</div>`;
    });
  }

  else if(q.type==="multi"){
    q.options.forEach((opt,i)=>{
      html += `<div><input type="checkbox" onclick="toggle(${i})"> ${opt}</div>`;
    });
  }

  else{
    html = `<input type="text" oninput="inputAnswer=this.value">`;
  }

  document.getElementById("options").innerHTML = html;
  document.getElementById("result").innerText = "";
  updateStats();
}

// ===== 多选 =====
function toggle(i){
  if(selected.includes(i)){
    selected = selected.filter(x=>x!==i);
  }else{
    selected.push(i);
  }
}

// ===== 提交 =====
function submitAnswer(){

  let q = questions[current];
  q.done++;

  let correct = false;
  let ans = "";

  if(q.type==="blank"){
    correct = inputAnswer.trim().toLowerCase() === q.answer.toLowerCase();
    ans = q.answer;
  }else{
    correct = JSON.stringify(selected.sort()) === JSON.stringify(q.answer.sort());
    ans = q.answer.map(i=>q.options[i]).join(" / ");
  }

  if(correct){
    q.correct++;
    document.getElementById("result").innerHTML =
      "<span class='correct'>✔ 正确</span><br>答案："+ans;
  }else{
    q.wrong++;
    document.getElementById("result").innerHTML =
      "<span class='wrong'>✘ 错误</span><br>正确答案："+ans;
  }

  saveData();
  updateStats();
}

// ===== 下一题 =====
function nextQuestion(){

  if(mode==="random"){
    current = Math.floor(Math.random()*questions.length);
    showQuestion();
  }

  else if(mode==="wrong"){
    let wrongList = questions.filter(q=>q.wrong>0);
    if(wrongList.length===0){
      alert("没有错题！");
      return;
    }
    showQuestion(wrongList[Math.floor(Math.random()*wrongList.length)]);
  }

  else{
    current = (current+1)%questions.length;
    showQuestion();
  }
}

// ===== 保存 =====
function saveData(){
  localStorage.setItem("quizData", JSON.stringify(questions));
}

// ===== 统计 =====
function updateStats(){
  let total = questions.reduce((a,b)=>a+b.done,0);
  let correct = questions.reduce((a,b)=>a+b.correct,0);
  let wrong = questions.reduce((a,b)=>a+b.wrong,0);

  let rate = total===0 ? 0 : Math.round(correct/total*100);

  document.getElementById("stats").innerText =
    `已做:${total}  正确率:${rate}%  错题:${wrong}`;
}

// ===== 初始化 =====
showQuestion();

</script>
